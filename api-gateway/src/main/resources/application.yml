spring.application.name: api-gateway

server.port: 8180

jwt.secretKey: dlagvlnfalkfj3oi43io524oi4io2fdsvknsddfn34oi55o5u3rgjkdfngdf23432tgregfdfdgfsldkgdfsglsd23323rfedsv


eureka.client.service-url.defaultZone: http://localhost:8761/eureka/

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - name: Path
                  args:
                    pattern: /api/v1/users/**
              filters:
                - name: StripPrefix
                  args:
                    parts: 2

            - id: posts-service
              uri: lb://POSTS-SERVICE
              predicates:
                - name: Path
                  args:
                    pattern: /api/v1/posts/**
              filters:
                - name: StripPrefix
                  args:
                    parts: 2
                - name: AuthenticationFilter

            - id: connections-service
              uri: lb://CONNECTIONS-SERVICE
              predicates:
                - name: Path
                  args:
                    pattern: /api/v1/connections/**
              filters:
                - name: StripPrefix
                  args:
                    parts: 2
                - name: AuthenticationFilter

